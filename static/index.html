<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks</title>
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <style>
        :root {
          --bg-dark: #121212;
          --panel-dark: #1e1e1e;
          --text-main: #e0e0e0;
          --accent: #bb86fc;
          --danger: #cf6679;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }
        
        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: var(--panel-dark);
            padding: 20px;
            border-right: 1px solid #333;
        }
        
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        
        .sidebar li {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
        }
        
        .sidebar li:hover, .sidebar li.active {
            background-color: #333;
            color: var(--accent);
        }


        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
      
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--panel-dark);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .tag {
            background: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .btn-primary {
            background-color: var(--accent);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
        }
        .category-badge {
            background-color: var(--accent); 
            color: #000;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .card-body {
            position: relative; 
        }
               
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
      
        .modal-content {
            background: var(--panel-dark);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            position: relative;
            border: 1px solid var(--accent);
        }
    
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-main);
        }
      
        .modal-overlay.active {
            display: flex;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; 
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Категорії</h2>
            <ul id="category-list">
                <li class="active"><i class="fas fa-folder"></i> Всі закладки</li>
                <li><i class="fas fa-code"></i> Програмування</li>
                <li><i class="fas fa-gamepad"></i> Ігри</li>
            </ul>
            <button class="btn-add" id="openFormBtn-с">+ Нова категорія</button>
        </aside>
        <div id="modalOverlay-с" class="modal-overlay">
            <div class="modal-content">
                <span id="closeFormBtn-с" class="close-btn">&times;</span>
                <h3>Нова категорія</h3>
                <form id="categoryForm">
                    <input type="text" id="title-с" placeholder="Назва" required>
                    <button type="submit" class="btn-primary" id="btn-submit-с">Зберегти</button>
                </form>
            </div>
        </div>

        <main class="content">
            <header>
                <h1>Мої закладки</h1>
                <button id="openFormBtn" class="btn-primary">Додати закладку</button>
            </header>

            <div class="bookmark-grid">
                <div class="card">
                    <div class="card-body">
                        <h3>FastAPI Documentation</h3>
                        <p>Офіційна документація найкращого фреймворку</p>
                        <a href="https://fastapi.tiangolo.com" target="_blank" class="link">fastapi.tiangolo.com</a>
                    </div>
                    <div class="card-footer">
                        <span class="tag">Python</span>
                        <button class="btn-delete"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                </div>
        </main>
        <div id="modalOverlay" class="modal-overlay">
            <div class="modal-content">
                <span id="closeFormBtn" class="close-btn">&times;</span>
                <h3>Нова закладка</h3>
                <form id="bookmarkForm">
                    <input type="text" id="title" placeholder="Назва" required>
                    <input type="url" id="url" placeholder="URL" required>
                    <select id="categorySelect">
                        <option value=""></option>
                    </select>
                    <button type="submit" class="btn-primary" id="btn-submit">Зберегти</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        async function load() {
            try {
                const bk_response = await fetch('http://127.0.0.1:8000/bookmarks');
                const ct_response = await fetch('http://127.0.0.1:8000/categories');

                const bookmarksData = await bk_response.json();
                const categoriesData = await ct_response.json();

                const container_1 = document.querySelector('.bookmark-grid');
                container_1.innerHTML = '';
                bookmarksData['bookmarks'].forEach(item => {
                    container_1.innerHTML += `
                        <div class="card">
                            <div class="card-body">
                                <span class="category-badge">${item.bk_category}</span>
                                <h3>${item.bk_name}</h3>
                                <a href="${item.bk_url}" target="_blank" class="link">Переглянути</a>
                            </div>
                        </div>
                    `;
                });
              
                const container_2 = document.querySelector('#category-list');
                const container_3 = document.querySelector('#categorySelect');

                container_2.innerHTML = '<li class="active" data-id="all">All categories</li>';
                container_3.innerHTML = '<option value="" disabled selected>Виберіть категорію...</option>';

                categoriesData['categories'].forEach(item => {
                    container_2.innerHTML += `<li data-id="${item.ct_id}">${item.ct_name}</li>`;
                    container_3.innerHTML += `<option value="${item.ct_id}">${item.ct_name}</option>`;
                });
            } catch (err) {
                console.error("Помилка завантаження:", err);
            }
        }
      
        const modal = document.getElementById('modalOverlay');
        const modal2 = document.getElementById('modalOverlay-с');
        const openBtn = document.getElementById('openFormBtn');
        const closeBtn = document.getElementById('closeFormBtn');
        const openBtn2 = document.getElementById('openFormBtn-с');
        const closeBtn2 = document.getElementById('closeFormBtn-с');
        const b_form = document.getElementById('bookmarkForm');
        const c_form = document.getElementById('categoryForm');

        window.onload = load;

        openBtn.onclick = () => modal.classList.add('active');
        closeBtn.onclick = () => modal.classList.remove('active');

        openBtn2.onclick = () => modal2.classList.add('active');
        closeBtn2.onclick = () => modal2.classList.remove('active');

        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
            if (e.target === modal2) modal2.classList.remove('active');
        });

        b_form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('title').value,
                url: document.getElementById('url').value,
                type: parseInt(document.getElementById('categorySelect').value)
            };

            const response = await fetch('http://127.0.0.1:8000/addbookmark', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('Закладку додано!');
                modal.classList.remove('active');
                b_form.reset();
                load();
            } else {
                alert('Помилка при додаванні');
            }
        });

        c_form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryNameInput = document.getElementById('title-с');

            const payload = {
                name: categoryNameInput.value
            };

            const response = await fetch('http://127.0.0.1:8000/addcategory', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('Категорію додано!');
                modal2.classList.remove('active');
                c_form.reset();
                load();
            } else {
                alert('Помилка при додаванні');
            }
        });
    </script>
    <script>
        const categoryList = document.querySelector('#category-list');
        
        categoryList.addEventListener('click', async (e) => {
            const target = e.target.closest('li');
            if (!target) return;
    
            document.querySelectorAll('#category-list li').forEach(li => li.classList.remove('active'));
            target.classList.add('active');
        
            const categoryId = target.getAttribute('data-id');
        
            filterBookmarks(categoryId);
        });

        async function filterBookmarks(id) {
            const response = await fetch('http://127.0.0.1:8000/bookmarks');
            const data = await response.json();
            const container = document.querySelector('.bookmark-grid');
            container.innerHTML = '';
        
            const filtered = (id === 'all')
                ? data['bookmarks']
                : data['bookmarks'].filter(bk => bk.ct_id == id); 
        
            filtered.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-body">
                            <span class="category-badge">${item.bk_category}</span>
                            <h3>${item.bk_name}</h3>
                            <a href="${item.bk_url}" target="_blank" class="link">Переглянути</a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
